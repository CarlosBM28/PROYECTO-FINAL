<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Veterinaria</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: linear-gradient(90deg, #27ae60, #2ecc71);
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    width: 90%;
    margin: 20px auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
}

input {
    padding: 10px;
    margin: 5px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #27ae60;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #219150;
}

.delete-btn {
    background: red;
}

.delete-btn:hover {
    background: darkred;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #27ae60;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<header>
    <h1>🐶 Sistema Inventario Veterinaria</h1>
</header>

<div class="container">

    <!-- FORMULARIO -->
    <div class="card">
        <h2>Agregar / Editar Producto</h2>

        <input id="nombre" placeholder="Nombre">
        <input id="tipo" placeholder="Tipo">
        <input id="precio" type="number" placeholder="Precio">
        <input id="stock" type="number" placeholder="Stock">

        <button id="btnGuardar" onclick="crearProducto()">Guardar</button>
    </div>

    <!-- TABLA -->
    <div class="card">
        <h2>Inventario</h2>

        <button onclick="cargarProductos()">Actualizar</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProductos"></tbody>
        </table>
    </div>

</div>

<script>
const API = "http://127.0.0.1:5000";
let editando = false;
let idEditar = null;

// 🔹 Crear producto
function crearProducto() {

    let nombre = document.getElementById("nombre").value;
    let tipo = document.getElementById("tipo").value;
    let precio = document.getElementById("precio").value;
    let stock = document.getElementById("stock").value;

    if (!nombre || !tipo || !precio || !stock) {
        alert("Todos los campos son obligatorios");
        return;
    }

    fetch(API + "/productos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nombre: nombre,
            tipo: tipo,
            precio: parseFloat(precio),
            stock: parseInt(stock)
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);
        alert(data.mensaje || data.error);
        cargarProductos();
    })
    .catch(error => console.error(error));
}

// 🔹 Cargar productos
function cargarProductos() {
    fetch(API + "/productos")
    .then(res => res.json())
    .then(data => {
        let tabla = "";
        data.forEach(p => {
            tabla += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.nombre}</td>
                    <td>${p.tipo}</td>
                    <td>$${p.precio}</td>
                    <td>${p.stock}</td>
                    <td>
                        <button onclick="editarProducto(${p.id}, '${p.nombre}', '${p.tipo}', ${p.precio}, ${p.stock})">Editar</button>
                        <button class="delete-btn" onclick="eliminarProducto(${p.id})">Eliminar</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById("tablaProductos").innerHTML = tabla;
    });
}

// 🔹 Editar producto
function editarProducto(id, nombre, tipo, precio, stock) {
    document.getElementById("nombre").value = nombre;
    document.getElementById("tipo").value = tipo;
    document.getElementById("precio").value = precio;
    document.getElementById("stock").value = stock;

    editando = true;
    idEditar = id;

    document.getElementById("btnGuardar").innerText = "Actualizar";
}

// 🔹 Actualizar producto
function actualizarProducto() {
    fetch(API + "/productos/" + idEditar, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nombre: document.getElementById("nombre").value,
            tipo: document.getElementById("tipo").value,
            precio: document.getElementById("precio").value,
            stock: document.getElementById("stock").value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.mensaje);
        limpiarFormulario();
        cargarProductos();
        editando = false;
        document.getElementById("btnGuardar").innerText = "Guardar";
    });
}

// 🔹 Eliminar producto
function eliminarProducto(id) {
    if(confirm("¿Eliminar producto?")) {
        fetch(API + "/productos/" + id, {
            method: "DELETE"
        })
        .then(res => res.json())
        .then(data => {
            alert(data.mensaje);
            cargarProductos();
        });
    }
}

// 🔹 Limpiar formulario
function limpiarFormulario() {
    document.getElementById("nombre").value = "";
    document.getElementById("tipo").value = "";
    document.getElementById("precio").value = "";
    document.getElementById("stock").value = "";
}

// Cargar al iniciar
cargarProductos();
</script>

</body>
</html>
