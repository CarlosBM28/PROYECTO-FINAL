<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VetStock Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;
background:#f8fafc;
padding:40px;
color:#0f172a;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

h1{
font-family:'Syne',sans-serif;
font-size:34px;
color:#0f766e;
}

.welcome{
font-size:18px;
font-weight:600;
color:#334155;
}

.card{
background:white;
padding:30px;
border-radius:22px;
box-shadow:0 20px 45px rgba(15,23,42,0.08);
margin-bottom:30px;
}

h2{
font-family:'Syne',sans-serif;
margin-bottom:20px;
color:#0f172a;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #cbd5e1;
border-radius:14px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#14b8a6;
box-shadow:0 0 0 4px rgba(20,184,166,.12);
}

.form-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

button{
border:none;
padding:14px 18px;
border-radius:14px;
font-weight:700;
cursor:pointer;
transition:.25s;
font-family:'DM Sans';
}

button:hover{
transform:translateY(-2px);
}

.btn-insertar{
background:linear-gradient(135deg,#0f766e,#14b8a6);
color:white;
}

.btn-editar{
background:linear-gradient(135deg,#f59e0b,#fbbf24);
color:white;
}

.btn-eliminar{
background:linear-gradient(135deg,#dc2626,#ef4444);
color:white;
}

.btn-logout{
background:#0f172a;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0f766e;
color:white;
padding:14px;
}

td{
padding:14px;
border-bottom:1px solid #e2e8f0;
text-align:center;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🐾 VetStock Dashboard</h1>
<button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

<p class="welcome" id="bienvenida"></p>

<div class="card">
<h2 id="tituloForm">Insertar Producto</h2>

<input type="hidden" id="productoId">

<div class="form-grid">
<input id="nombre" placeholder="Nombre">
<input id="tipo" placeholder="Tipo">
<input id="precio" placeholder="Precio">
<input id="stock" placeholder="Stock">
</div>

<br>

<button class="btn-insertar" id="btnGuardar" onclick="guardarProducto()">
Insertar
</button>
</div>

<div class="card">
<h2>Inventario</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Tipo</th>
<th>Precio</th>
<th>Stock</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaProductos"></tbody>
</table>
</div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location.href="/";
}

document.getElementById("bienvenida").innerText =
"Bienvenido, " + localStorage.getItem("nombre");

async function cargarProductos(){

const res = await fetch('/productos',{
headers:{
'Authorization':'Bearer ' + token
}
});

const productos = await res.json();

let html='';

productos.forEach(p=>{
html+=`
<tr>
<td>${p.id}</td>
<td>${p.nombre}</td>
<td>${p.tipo}</td>
<td>$${p.precio}</td>
<td>${p.stock}</td>
<td>
<div class="actions">
<button class="btn-editar" onclick='editarProducto(${JSON.stringify(p)})'>
Editar
</button>

<button class="btn-eliminar" onclick="eliminarProducto(${p.id})">
Eliminar
</button>
</div>
</td>
</tr>
`;
});

document.getElementById("tablaProductos").innerHTML=html;
}

async function guardarProducto(){

const id=document.getElementById("productoId").value;

const producto={
nombre:document.getElementById("nombre").value,
tipo:document.getElementById("tipo").value,
precio:document.getElementById("precio").value,
stock:document.getElementById("stock").value
};

let url='/productos';
let method='POST';

if(id){
url='/productos/'+id;
method='PUT';
}

await fetch(url,{
method:method,
headers:{
'Content-Type':'application/json',
'Authorization':'Bearer ' + token
},
body:JSON.stringify(producto)
});

limpiarFormulario();
cargarProductos();
}

function editarProducto(producto){

document.getElementById("productoId").value=producto.id;
document.getElementById("nombre").value=producto.nombre;
document.getElementById("tipo").value=producto.tipo;
document.getElementById("precio").value=producto.precio;
document.getElementById("stock").value=producto.stock;

document.getElementById("tituloForm").innerText="Editar Producto";
document.getElementById("btnGuardar").innerText="Actualizar";
document.getElementById("btnGuardar").className="btn-editar";
}

async function eliminarProducto(id){

if(!confirm("¿Eliminar producto?")) return;

await fetch('/productos/'+id,{
method:'DELETE',
headers:{
'Authorization':'Bearer ' + token
}
});

cargarProductos();
}

function limpiarFormulario(){
document.getElementById("productoId").value='';
document.getElementById("nombre").value='';
document.getElementById("tipo").value='';
document.getElementById("precio").value='';
document.getElementById("stock").value='';

document.getElementById("tituloForm").innerText="Insertar Producto";
document.getElementById("btnGuardar").innerText="Insertar";
document.getElementById("btnGuardar").className="btn-insertar";
}

function logout(){
localStorage.clear();
window.location.href="/";
}

cargarProductos();

</script>

</body>
</html>
